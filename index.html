<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Copypaste Engineer Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root{
      --bg:#071025; /* deep navy */
      --card:#071725;
      --accent:#7ee787; /* dev green */
      --muted:#94a3b8;
    }
    html,body,#root{height:100%;}
    body {
      background: radial-gradient(circle at top, #030617, #02040a);
      color: #e6eef8;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      scroll-behavior: smooth;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* developer look */
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace; }
    .terminal {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(126,231,135,0.06);
      box-shadow: 0 6px 30px rgba(2,6,23,0.6);
    }

    .badge { background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.03); padding:0.18rem 0.5rem; border-radius:999px; font-size:0.8rem }

    /* small copy feedback */
    .copied { position:relative; }
    .copied::after{ content: "Copied"; position:absolute; right:100%; margin-right:0.4rem; top:50%; transform:translateY(-50%); font-size:0.75rem; color:var(--accent); opacity:0; transition:opacity .18s; }
    .copied.show::after{ opacity:1; }

  </style>
</head>

<body class="text-white">
<div id="root"></div>

<script type="text/babel">

const IconGitHub = () => (
  <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" className="inline-block mr-2" xmlns="http://www.w3.org/2000/svg"><path fillRule="evenodd" d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2 .37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52 0-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.86 2.33.66.07-.52.28-.86.51-1.06-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.22 2.2.82a7.6 7.6 0 012 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
);

const Section = React.forwardRef(({ title, children, desc }, ref) => (
  <section ref={ref} className="max-w-6xl mx-auto px-6 py-16 border-t border-white/6">
    <h2 className="text-2xl font-bold mb-2 mono">{title}</h2>
    {desc && <p className="text-sm text-gray-400 mb-4">{desc}</p>}
    {children}
  </section>
));

const Card = ({ title, desc, extra, actions, className }) => (
  <div className={`p-5 rounded-xl terminal ${className||''}`}>
    <h3 className="font-semibold text-lg mono">{title}</h3>
    <p className="text-gray-400 mt-2 text-sm">{desc}</p>
    {extra && <p className="text-xs text-gray-500 mt-3 mono">{extra}</p>}
    {actions && <div className="mt-3">{actions}</div>}
  </div>
);

const App = () => {

  const refs = {
    about: React.useRef(null),
    skills: React.useRef(null),
    projects: React.useRef(null),
    experience: React.useRef(null),
    contact: React.useRef(null),
  };

  const scrollTo = (key) => {
    refs[key].current?.scrollIntoView({ behavior: "smooth" });
  };

  const [repos, setRepos] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    fetch("https://api.github.com/users/qianyu15/repos?per_page=100")
      .then(res => res.json())
      .then(data => {
        if (Array.isArray(data)) {
          // sort by stars desc
          data.sort((a,b) => b.stargazers_count - a.stargazers_count);
          setRepos(data);
        }
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const [form, setForm] = React.useState({ name: "", email: "", message: "" });
  const [status, setStatus] = React.useState("");

  const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

  const handleSend = async () => {
    if (!form.name || !form.email || !form.message) { setStatus("全部入力しろ"); return; }
    setStatus("送信中...");
    try {
      const res = await fetch("https://formspree.io/f/xykakpkg", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(form)
      });
      if (res.ok) { setStatus("送信完了(実際に届いてる)"); setForm({ name: "", email: "", message: "" }); }
      else setStatus("送信失敗");
    } catch (err) { setStatus("通信エラー"); }
  };

  const copy = (text, el) => {
    navigator.clipboard?.writeText(text).then(() => {
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1200);
    }).catch(()=>{});
  };

  return (
    <div>

      {/* NAV */}
      <header className="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="px-3 py-1 border rounded mono text-sm bg-white/3">DEV</div>
          <h1 className="font-bold mono flex items-center"> <IconGitHub/> Qianyu Yang</h1>
        </div>

        <nav className="space-x-4 text-sm text-gray-300 mono">
          <button type="button" onClick={() => scrollTo("about")} className="hover:underline">About</button>
          <button type="button" onClick={() => scrollTo("skills")} className="hover:underline">Skills</button>
          <button type="button" onClick={() => scrollTo("projects")} className="hover:underline">Projects</button>
          <button type="button" onClick={() => scrollTo("experience")} className="hover:underline">Experience</button>
          <button type="button" onClick={() => scrollTo("contact")} className="hover:underline">Contact</button>
        </nav>
      </header>

      {/* HERO */}
      <section className="max-w-6xl mx-auto px-6 py-20">
        <div className="grid md:grid-cols-2 gap-6 items-start">
          <div>
            <h2 className="text-5xl font-bold mono">Qianyu Yang</h2>
            <p className="mt-4 text-gray-400 max-w-xl">AI Copypaste Engineer — 自動生成コードを実用レベルへ統合するのが得意です。等幅フォントでスニペットやクローンコマンドを見せる UI を重視。</p>

            <div className="mt-6 flex gap-3">
              <button onClick={() => scrollTo('projects')} className="px-6 py-2 bg-white text-black rounded mono">View Projects</button>
              <a href="https://github.com/qianyu15" target="_blank" rel="noreferrer" className="px-6 py-2 border border-white/20 rounded mono">View on GitHub</a>
            </div>

            <div className="mt-6 terminal p-4 rounded text-sm mono">
              <code>
{`const me = {
  name: 'Qianyu Yang',
  role: 'AI Copypaste Engineer',
  focus: ['React', 'AI prompt', 'API integration']
}`}
              </code>
            </div>
          </div>

          <div>
            <div className="terminal p-4 rounded">
              <div className="flex justify-between items-center text-sm text-gray-400 mb-2">
                <div className="flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-red-500"></span>
                  <span className="w-2 h-2 rounded-full bg-yellow-400"></span>
                  <span className="w-2 h-2 rounded-full bg-green-500"></span>
                </div>
                <div className="text-xs text-gray-500">portfolio@dev</div>
              </div>

              <div className="mono text-sm">
                <div className="text-green-400">➜</div>
                <div>Available: React, TypeScript, Node, Tailwind, GPT-API</div>
                <div className="mt-2 text-xs text-gray-400">Top repo: {repos[0]?.name || '—' } ⭐ {repos[0]?.stargazers_count || 0}</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ABOUT */}
      <Section ref={refs.about} title="About" desc="開発者向けに見やすく、等幅・ターミナル風デザインにしました。">
        <p className="text-gray-400 mono">AIコピペ開発で構成されたポートフォリオ。生成コードを検証・統合し、実運用へ落とし込むエンジニアリングを得意とします。</p>
      </Section>

      {/* SKILLS */}
      <Section ref={refs.skills} title="Skills">
        <div className="flex flex-wrap gap-3">
          {['Prompt Engineering','React','TypeScript','Node.js','API Integration','CI/CD','Testing'].map(s => (
            <div key={s} className="badge mono">{s}</div>
          ))}
        </div>
      </Section>

      {/* PROJECTS */}
      <Section ref={refs.projects} title="Projects (GitHub API)" desc="スター順に上位を表示。クローンコマンドのコピーが可能です。">
        {loading ? (
          <p className="text-gray-400">Loading...</p>
        ) : (
          <div className="grid md:grid-cols-3 gap-4">
            {repos.slice(0, 9).map(repo => (
              <Card
                key={repo.id}
                title={<div className="flex items-center justify-between"><span className="mono">{repo.name}</span><span className="text-xs text-gray-400">{repo.language || '—'}</span></div>}
                desc={repo.description || "No description"}
                extra={<div className="flex items-center justify-between mt-2">
                  <div className="text-xs text-gray-400 mono">⭐ {repo.stargazers_count} • Forks: {repo.forks_count}</div>
                  <div className="flex items-center gap-2">
                    <a className="text-xs text-green-300 mono border border-green-500/10 px-2 py-1 rounded" href={repo.html_url} target="_blank" rel="noreferrer">Open</a>
                    <button
                      onClick={(e) => copy(`git clone ${repo.clone_url}`, e.currentTarget)}
                      className="text-xs mono px-2 py-1 border rounded bg-white/3"
                      title="Copy clone command"
                    >Copy</button>
                  </div>
                </div>}
                className="h-full"
              />
            ))}
          </div>
        )}
      </Section>

      {/* EXPERIENCE */}
      <Section ref={refs.experience} title="Experience">
        <div className="space-y-2 text-gray-400 mono">
          <p>2025 — AIコピペ開発開始</p>
          <p>2026 — ReactをAI経由で使用</p>
        </div>
      </Section>

      {/* CONTACT (FORMSPREE REAL SEND) */}
      <Section ref={refs.contact} title="Contact">
        <div className="max-w-md space-y-3">

          <input
            name="name"
            value={form.name}
            onChange={handleChange}
            className="w-full p-3 bg-white/3 border border-white/6 rounded mono"
            placeholder="Name"
          />

          <input
            name="email"
            value={form.email}
            onChange={handleChange}
            className="w-full p-3 bg-white/3 border border-white/6 rounded mono"
            placeholder="Email"
          />

          <textarea
            name="message"
            value={form.message}
            onChange={handleChange}
            rows="4"
            className="w-full p-3 bg-white/3 border border-white/6 rounded mono"
            placeholder="Message"
          />

          <button
            type="button"
            onClick={handleSend}
            className="px-6 py-2 bg-white text-black rounded font-medium mono"
          >
            Send
          </button>

          {status && (
            <p className="text-sm text-gray-400 mono">{status}</p>
          )}

        </div>
      </Section>

      {/* FOOTER */}
      <footer className="text-center text-gray-500 py-10 border-t border-white/6 mono">
        © 2026 AI Copypaste Engineer — <a href="https://github.com/qianyu15" className="text-green-300">@qianyu15</a>
      </footer>

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
