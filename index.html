<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYS.PORTFOLIO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-gray-300 font-mono">

<!-- TOP BAR -->
<header class="border-b border-gray-800 px-6 py-3 flex justify-between text-xs tracking-widest">
  <div>SYS.PORTFOLIO v1.0</div>
  <div id="status">LOADING...</div>
</header>

<!-- USER PANEL -->
<section class="grid md:grid-cols-3 border-b border-gray-800">

  <div class="p-6 border-r border-gray-800">
    <div class="text-xs text-gray-500">IDENTITY</div>
    <img id="avatar" class="w-16 h-16 mt-3 border border-gray-700" />
    <div id="name" class="mt-3 text-sm">NULL</div>
    <div id="bio" class="text-xs text-gray-500 mt-2"></div>
  </div>

  <div class="p-6 border-r border-gray-800">
    <div class="text-xs text-gray-500">METRICS</div>
    <div class="mt-3 text-sm">
      FOLLOWERS: <span id="followers">0</span><br/>
      REPOS: <span id="repos">0</span>
    </div>
  </div>

  <div class="p-6">
    <div class="text-xs text-gray-500">SYSTEM</div>
    <div class="mt-3 text-xs text-gray-400">
      STATUS: ONLINE<br/>
      MODE: READ-ONLY UI<br/>
      SOURCE: GitHub API
    </div>
  </div>

</section>

<!-- REPOSITORIES -->
<section class="p-6">

  <div class="text-xs text-gray-500 mb-4">REPOSITORIES</div>

  <div id="repoList" class="grid md:grid-cols-3 gap-2"></div>

</section>

<script>
const USER = "qianyu15";

async function boot() {

  document.getElementById("status").textContent = "SYNCING...";

  const user = await fetch(`https://api.github.com/users/${USER}`).then(r => r.json());

  document.getElementById("avatar").src = user.avatar_url;
  document.getElementById("name").textContent = user.login.toUpperCase();
  document.getElementById("bio").textContent = user.bio || "NO DESCRIPTION";

  document.getElementById("followers").textContent = user.followers;
  document.getElementById("repos").textContent = user.public_repos;

  const repos = await fetch(`https://api.github.com/users/${USER}/repos?sort=updated`).then(r => r.json());

  const container = document.getElementById("repoList");

  repos.slice(0, 12).forEach(repo => {

    const el = document.createElement("div");
    el.className = "border border-gray-800 p-3 text-xs";

    el.innerHTML = `
      <div class="text-gray-400">${repo.name}</div>
      <div class="text-gray-600 mt-1">${repo.language || "UNKNOWN"}</div>
      <div class="mt-2 text-gray-700">
        ★${repo.stargazers_count} FORK:${repo.forks_count}
      </div>
      <a href="${repo.html_url}" target="_blank" class="text-gray-500 mt-2 inline-block">
        OPEN
      </a>
    `;

    container.appendChild(el);
  });

  document.getElementById("status").textContent = "ONLINE";
}

boot();
</script>

</body>
</html>
